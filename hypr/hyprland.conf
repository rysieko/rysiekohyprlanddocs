
# Variables
$mainMod = SUPER
$terminal = kitty
$fileManager = nemo
$menu = hyprlauncher

# Monitors
monitorv2 {
  output = DP-1
  mode = 2560x1440@144
  position = 0x0
  scale = 1
  bitdepth = 10
  cm = auto
  vrr = 1
  supports_hdr = 1
  supports_wide_color = 1
  sdr_max_luminance = 200
  sdr_eotf = 1
  #auto_hdr = 1
 } 
# Environment Variables
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
# Autostart
exec-once = waybar
exec-once = swaync
exec-once = hyprpaper
exec-once = hypridle
exec-once = steam
exec-ouce = spotify
exec-once = systemctl --user start hyprpolkitagent
exec-once = udiskie
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = vesktop
exec-once = kdeconnectd; kdeconnect-indicator
input {
    kb_layout = pl
    follow_mouse = 1
    sensitivity = 0.9
    touchpad {
        natural_scroll = false
    }
}

# Gestures
#gestures {
#  workspace_swipe = false
#}

# General
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    #color.active_border = rgba(33ccffee) rgba(00ff99ee)w librusienw librusien 45deg
    #color.inactive_border = rgba(595959aa)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
    #col = [object Object]
    allow_tearing = true
}

# Decoration
decoration {
   rounding = 0
    active_opacity = 1+hs
    inactive_opacity = 1
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 311
        passes = 2
        vibrancy = 0.1696
    }
}

# Animations
animations {
    enabled = true
    bezier = easeOutQuint, 0.23,1,0.32,1
    bezier = easeInOutCubic, 0.65,0.05,0.36,1
    bezier = linear, 0,0,1,1
    bezier = almostLinear, 0.5,0.5,0.75,1.0
    bezier = quick, 0.15,0,0.1,1
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut,  want to do 0.54 with all the new goodies some time soon1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade

}
# dwindle Layout
dwindle {
    pseudotile = true
    preserve_split = false
}
scrolling {
    direction = right
    column_width = 1.0
}

# Miscellaneous
misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    middle_click_paste = false
}
render {
    cm_enabled = false
    cm_fs_passthrough = true
}
# Per-Device Input Settings
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

$mainMod = SUPER

# 
bind = $mainMod, Tab, togglefloating
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = Ctrl Alt, Esc, exit,
bind = $mainMod, E, exec, $fileManager #Thunar file manager
bind = $mainMod, D, exec, $menu #Hyprlauncher menu
bind = $mainMod, Delete, exec, wlogout
bind = $mainMod, F, fullscreen, toggle

bind = $mainMod, I, exec, hyprsysteminfo

bind = $mainMod, P, exec, spotify-control play-pause
bind = $mainMod, N, exec, spotify-control next
bind = $mainMod, B, exec, spotify-control previous

bind = $mainMod, F1, exec, pkill -9 steam
bind = $mainMod, F2, exec, pkill -9 waybar && waybar
bind = $mainMod, Escape, exec, pkill -9 gamescope
bind = $mainMod, F3, exec, pkill -9 hyprpaper && hyprpaper

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, Print, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | notify-send "Screenshot" "Screenshot of the region taken" -t 1000 # screenshot of a region 
bind = $mainMod SHIFT, Print, exec, grim - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | notify-send "Screenshot" "Screenshot of whole screen taken"  # screenshot of the whole screen
bind = $mainMod SHIFT, P, exec, hyprpicker -f rgb -a
bind = $mainMod, C, exec, protonvpn connect | notify-send "VPN" "VPN connected" 
bind = $mainMod, V, exec, protonvpn disconnect | notify-send "VPN" "VPN disconnected"
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = Ctrl Shift, 1, movetoworkspace, 1
bind = Ctrl Shift, 2, movetoworkspace, 2
bind = Ctrl Shift, 3, movetoworkspace, 3
bind = Ctrl Shift, 4, movetoworkspace, 4
bind = Ctrl Shift, 5, movetoworkspace, 5
bind = Ctrl Shift, 6, movetoworkspace, 6
bind = Ctrl Shift, 7, movetoworkspace, 7direction
bind = Ctrl Shift, 8, movetoworkspace, 8
bind = Ctrl Shift, 9, movetoworkspace, 9
bind = Ctrl Shift, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
#move and resize windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
 

#window rules
#class for auto move
windowrule = tag +browser, match:class firefox
windowrule = tag +games, match:class gamescope
windowrule = tag +games, match:class steam_app
windowrule = tag +gamelaunch, match:class steam
windowrule = tag +gamelaunch, match:title lutris
windowrule = tag +im, match:class vesktop
windowrule = tag +file-manager, match:class nemo
windowrule = tag +music, match:class spotify
windowrule = tag +volume, match:class org.pulseaudio.pavucontrol
# automove to workspaces
windowrule = workspace 1, match:tag browser
windowrule = workspace 2, float on, match:tag gamelaunch
windowrule = workspace 3, match:tag im
windowrule = workspace 4, match:tag games
windowrule = workspace 2, float on,match:tag music
windowrule = float on ,match:tag file-manager
windowrule = float on, match:tag volume
windowrule = workspace 2,float on, match:class org.kde.kdeconnect.app
# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*
windowrule = float on, match:class kitty
windowrule = float on, match:class hyprland-share-picker
# Fix some dragging issues with XWayland

windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0
